name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debian-archive-keyring \
            mmdebstrap \
            zstd \
            qemu-utils \
            libguestfs-tools \
            gdisk \
            dosfstools \
            grub-efi-amd64-bin \
            grub-pc-bin

      - name: Run unit tests
        run: go test ./...

      - name: Build warp binary
        run: make build

      - name: Build rootfs
        run: |
          make rootfs
          sudo chown -R "$USER":"$USER" build/rootfs

      - name: Compute artifact version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build LXC artifact
        run: |
          packaging/lxc/build-lxc.sh \
            build/rootfs \
            build/warp-router-${{ steps.version.outputs.value }}-lxc-amd64.tar.zst

      - name: Build QCOW2 artifact
        run: |
          sudo packaging/qcow2/build-qcow2.sh \
            build/rootfs \
            build/warp-router-${{ steps.version.outputs.value }}-amd64.qcow2

      - name: Compute checksums
        run: |
          sha256sum build/warp-router-*-lxc-amd64.tar.zst > build/checksums.txt
          sha256sum build/warp-router-*-amd64.qcow2 >> build/checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: warp-router-build-artifacts
          path: |
            build/warp-router-*-lxc-amd64.tar.zst
            build/warp-router-*-amd64.qcow2
            build/checksums.txt
          if-no-files-found: error
