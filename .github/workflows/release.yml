name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debian-archive-keyring \
            mmdebstrap \
            zstd \
            qemu-utils \
            libguestfs-tools \
            gdisk \
            dosfstools \
            grub-efi-amd64-bin \
            grub-pc-bin

      - name: Build artifacts
        run: |
          make build
          make rootfs
          sudo chown -R "$USER":"$USER" build/rootfs

          VERSION="${GITHUB_REF_NAME}"
          packaging/lxc/build-lxc.sh \
            build/rootfs \
            build/warp-router-${VERSION}-lxc-amd64.tar.zst
          sudo packaging/qcow2/build-qcow2.sh \
            build/rootfs \
            build/warp-router-${VERSION}-amd64.qcow2

      - name: Generate checksums
        run: |
          sha256sum build/warp-router-*-lxc-amd64.tar.zst > build/checksums.txt
          sha256sum build/warp-router-*-amd64.qcow2 >> build/checksums.txt

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/warp-router-*-lxc-amd64.tar.zst
            build/warp-router-*-amd64.qcow2
            build/checksums.txt
          generate_release_notes: true
