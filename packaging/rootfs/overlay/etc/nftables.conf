#!/usr/sbin/nft -f
# Warp Router — nftables base ruleset
# This file is managed by 'warp apply'. Manual edits will be overwritten.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif "lo" accept

        # Established/related
        ct state established,related accept

        # ICMP (ping)
        ip protocol icmp accept

        # SSH
        tcp dport 22 accept

        # DHCP server (from LAN)
        udp dport { 67, 68 } accept

        # DNS (from LAN)
        tcp dport 53 accept
        udp dport 53 accept

        # BGP (for FRR peering if used)
        tcp dport 179 accept

        # BFD
        udp dport { 3784, 3785, 4784 } accept

        # Log and drop everything else
        log prefix "nft-input-drop: " counter drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # Established/related
        ct state established,related accept

        # No forwarding until 'warp apply' configures zone-based rules

        log prefix "nft-forward-drop: " counter drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table inet nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Masquerade on WAN interfaces (will be refined by warp apply)
        # Placeholder: no masquerade until config is applied
    }
}
