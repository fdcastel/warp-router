# Warp Router — Unbound DNS resolver configuration
# This file is managed by 'warp apply'. Manual edits will be overwritten.

server:
    verbosity: 1

    # Listen on localhost and LAN interfaces (will be refined by warp apply)
    interface: 127.0.0.1
    interface: ::1

    # Access control (will be refined by warp apply)
    access-control: 127.0.0.0/8 allow
    access-control: ::1/128 allow
    # Placeholder: LAN subnets will be added by warp apply
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    # Performance
    num-threads: 2
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4
    msg-cache-size: 64m
    rrset-cache-size: 128m

    # Privacy and security
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    use-caps-for-id: yes

    # Prefetch popular entries before they expire
    prefetch: yes
    prefetch-key: yes

    # Root hints
    root-hints: "/usr/share/dns/root.hints"

    # Trust anchor for DNSSEC
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
